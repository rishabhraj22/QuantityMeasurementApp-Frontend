<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Quantity Measurement App</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      
      <div class="auth-left">
        <img src="assets/login-illustration.png" alt="Auth Illustration" />
        <h2>Quantity Measurement App</h2>
        <p>Convert and Measure Quantities with Ease</p>
      </div>

      <div class="auth-right">
        <div class="auth-tabs">
          <a href="login.html" class="active">LOGIN</a>
          <a href="signup.html">SIGNUP</a>
        </div>

        <form id="loginForm" class="auth-form">
          <div>
            <label for="loginEmail">Email Id</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" />
            <small class="error" id="loginEmailError"></small>
          </div>

          <div>
            <label for="loginPassword">Password</label>
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="Enter your password" />
              <span onclick="togglePassword('loginPassword', this)">👁</span>
            </div>
            <small class="error" id="loginPasswordError"></small>
          </div>

          <button type="submit" class="auth-btn">Login</button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
