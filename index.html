<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantity Measurement App</title>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="app-shell">
    <div class="app-card">

      <!-- Top Header -->
      <header class="top-banner">
        <h1>Welcome To Quantity Measurement</h1>
      </header>

      <!-- User Bar -->
      <div class="user-bar">
        <p id="welcomeUser"></p>
        <button id="logoutBtn">Logout</button>
      </div>

      <!-- Main Content -->
      <main class="main-content">

        <section class="section-block">
          <h3 class="section-title">CHOOSE TYPE</h3>
          <div id="type-selector"></div>
        </section>

        <section class="section-block">
          <h3 class="section-title">CHOOSE ACTION</h3>
          <div id="action-tabs"></div>
        </section>

        <section class="section-block">
          <div id="input-panel"></div>
        </section>

      </main>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
