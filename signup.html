<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - Quantity Measurement App</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      
      <div class="auth-left">
        <img src="assets/login-illustration.png" alt="Auth Illustration" />
        <h2>Quantity Measurement App</h2>
        <p>Create your account to start using the app</p>
      </div>

      <div class="auth-right">
        <div class="auth-tabs">
          <a href="login.html">LOGIN</a>
          <a href="signup.html" class="active">SIGNUP</a>
        </div>

        <form id="signupForm" class="auth-form">
          <div>
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" />
            <small class="error" id="nameError"></small>
          </div>

          <div>
            <label for="signupEmail">Email Id</label>
            <input type="email" id="signupEmail" placeholder="Enter your email" />
            <small class="error" id="signupEmailError"></small>
          </div>

          <div>
            <label for="signupPassword">Password</label>
            <div class="password-wrapper">
              <input type="password" id="signupPassword" placeholder="Enter your password" />
              <span onclick="togglePassword('signupPassword', this)">👁</span>
            </div>
            <small class="error" id="signupPasswordError"></small>
          </div>

          <div>
            <label for="mobileNumber">Mobile Number</label>
            <input type="text" id="mobileNumber" placeholder="Enter your mobile number" />
            <small class="error" id="mobileError"></small>
          </div>

          <button type="submit" class="auth-btn">Signup</button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
